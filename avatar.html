<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Prototype — Lip Sync & Utilities</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d1117;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* ── TTS panel ── */
#tts-panel {
  background: #161b22;
  border-bottom: 1px solid #21262d;
  padding: 8px 14px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  flex-shrink: 0;
  z-index: 10;
}

#tts-text {
  flex: 1;
  min-height: 48px;
  max-height: 90px;
  background: #0d1117;
  color: #c9d1d9;
  border: 1px solid #30363d;
  border-radius: 4px;
  padding: 6px 8px;
  font-family: inherit;
  font-size: 11px;
  resize: vertical;
}
#tts-text:focus { outline: none; border-color: #58a6ff; }

#tts-buttons {
  display: flex;
  flex-direction: column;
  gap: 5px;
  flex-shrink: 0;
  align-self: center;
}

#speak-btn {
  padding: 6px 18px;
  background: #1f6feb;
  color: #fff;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
}
#speak-btn:hover:not(:disabled) { background: #388bfd; }
#speak-btn:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }

#export-btn {
  padding: 5px 18px;
  background: #21262d;
  color: #c9d1d9;
  border: 1px solid #30363d;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
}
#export-btn:hover:not(:disabled) { background: #30363d; }
#export-btn:disabled { color: #484f58; border-color: #21262d; cursor: not-allowed; }

#status-label {
  font-size: 10px;
  align-self: center;
  flex-shrink: 0;
  width: 82px;
  text-align: center;
  padding: 3px 6px;
  border-radius: 3px;
  border: 1px solid #30363d;
}
.status-idle     { color: #8b949e;  border-color: #30363d; }
.status-loading  { color: #d29922;  border-color: #d29922; }
.status-speaking { color: #3fb950;  border-color: #3fb950; }
.status-done     { color: #58a6ff;  border-color: #58a6ff; }
.status-error    { color: #f85149;  border-color: #f85149; }
.status-blocked  { color: #ff7b72;  border-color: #ff7b72; }

/* ── Viseme timeline bar ── */
#timeline-wrap {
  background: #0a0d11;
  border-bottom: 1px solid #21262d;
  flex-shrink: 0;
  height: 34px;
  display: none;
  position: relative;
  cursor: crosshair;
  z-index: 5;
}
#timeline-canvas {
  display: block;
  width: 100%;
  height: 100%;
}
#tl-hint {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 9px;
  color: #8b949e;
  pointer-events: none;
  user-select: none;
  background: rgba(10, 13, 17, 0.7);
  padding: 2px 4px;
  border-radius: 3px;
}

/* ── viewport ── */
#viewport {
  flex: 1;
  min-height: 0;
  position: relative;
}
#viewport canvas {
  display: block;
  width: 100% !important;
  height: 100% !important;
}

/* ── HUD debug overlay (D key toggle) ── */
#dbg-overlay {
  display: none;
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(13, 17, 23, 0.85);
  border: 1px solid #30363d;
  border-radius: 4px;
  padding: 8px 12px;
  font-size: 11px;
  color: #c9d1d9;
  line-height: 2.0;
  pointer-events: none;
  z-index: 100;
  min-width: 210px;
  backdrop-filter: blur(4px);
}
#dbg-overlay .dk { color: #8b949e; display: inline-block; width: 58px; }
#dbg-overlay .dv { color: #58a6ff; font-weight: bold; }
#dbg-overlay .dhint {
  margin-top: 5px;
  padding-top: 5px;
  border-top: 1px solid #21262d;
  font-size: 9px;
  color: #8b949e;
  line-height: 1.4;
}

/* ── Debug panel (collapsible) ── */
#debug-panel {
  background: #161b22;
  border-top: 1px solid #21262d;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  max-height: 38vh;
  overflow: hidden;
  z-index: 10;
}
#debug-panel > summary {
  padding: 5px 14px;
  color: #8b949e;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
#debug-panel > summary::-webkit-details-marker { display: none; }
#debug-panel > summary::before { content: '▶'; font-size: 8px; transition: transform .15s; }
#debug-panel[open] > summary::before { transform: rotate(90deg); }
#debug-panel > summary:hover { color: #c9d1d9; }

#panel {
  padding: 4px 14px 10px;
  overflow-y: auto;
  flex: 1;
}

#panel-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 6px;
}
#panel-header h3 {
  color: #58a6ff;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
#reset-btn {
  padding: 3px 14px;
  background: #21262d;
  color: #c9d1d9;
  border: 1px solid #30363d;
  border-radius: 4px;
  cursor: pointer;
  font-family: inherit;
  font-size: 11px;
}
#reset-btn:hover { background: #30363d; }

.v-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 2px 0;
  height: 20px;
}
.v-id   { width: 18px;  color: #8b949e; font-size: 10px; text-align: right; flex-shrink: 0; }
.v-name { width: 100px; color: #c9d1d9; font-size: 10px; flex-shrink: 0; }
.v-slider { flex: 1; height: 3px; cursor: pointer; accent-color: #58a6ff; }
.v-val  { width: 34px; color: #58a6ff; font-size: 10px; text-align: right; flex-shrink: 0; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #0d1117; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
</style>
</head>
<body>

<div id="tts-panel">
  <textarea id="tts-text">Hello! This is a multi-sentence test. 
Notice the short pause between sentences? 
The eyebrows raise when I speak, and the smoothing prevents extreme mouth shapes.</textarea>
  <div id="tts-buttons">
    <button id="speak-btn">Speak</button>
    <button id="export-btn" disabled title="Export viseme timeline as JSON">Export JSON</button>
  </div>
  <span id="status-label" class="status-idle">Idle</span>
</div>

<div id="timeline-wrap">
  <canvas id="timeline-canvas" height="34"></canvas>
  <span id="tl-hint">Click to fake-seek &middot; D = HUD</span>
</div>

<div id="viewport">
  <div id="dbg-overlay">
    <div><span class="dk">Time</span>   <span class="dv" id="dbg-time">---</span></div>
    <div><span class="dk">Viseme</span> <span class="dv" id="dbg-viseme">---</span></div>
    <div><span class="dk">Weight</span> <span class="dv" id="dbg-weight">---</span></div>
    <div><span class="dk">FPS</span>    <span class="dv" id="dbg-fps">---</span></div>
    <div class="dhint">D &mdash; toggle overlay<br>Click timeline &mdash; seek visemes</div>
  </div>
</div>

<details id="debug-panel">
  <summary>Debug &mdash; Viseme Sliders</summary>
  <div id="panel">
    <div id="panel-header">
      <h3>Viseme Controls</h3>
      <button id="reset-btn" onclick="window.resetVisemes()">Reset All</button>
    </div>
    <div id="sliders"></div>
  </div>
</details>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle.js"></script>
<script src="config.js" onerror="console.warn('config.js not found — Azure TTS will be unavailable')"></script>

<script>
// ================================================================
// AZURE SPEECH SDK CONFIGURATION
// ================================================================
const AZURE_SPEECH_KEY    = (window.AZURE_CONFIG && window.AZURE_CONFIG.key)    || '';
const AZURE_SPEECH_REGION = (window.AZURE_CONFIG && window.AZURE_CONFIG.region) || '';

// ================================================================
// VISEME DEFINITIONS (Azure IDs 0–14)
// ================================================================
const VISEMES = [
  { id:  0, name: 'sil' },
  { id:  1, name: 'PP'  },
  { id:  2, name: 'FF'  },
  { id:  3, name: 'TH'  },
  { id:  4, name: 'DD'  },
  { id:  5, name: 'kk'  },
  { id:  6, name: 'CH'  },
  { id:  7, name: 'SS'  },
  { id:  8, name: 'nn'  },
  { id:  9, name: 'RR'  },
  { id: 10, name: 'aa'  },
  { id: 11, name: 'E'   },
  { id: 12, name: 'ih'  },
  { id: 13, name: 'oh'  },
  { id: 14, name: 'ou'  },
];

const VISEME_COLORS = [
  '#3a3f47', // 0  sil
  '#b83030', // 1  PP  bilabial
  '#3060b0', // 2  FF  fricative
  '#3060b0', // 3  TH  fricative
  '#b06020', // 4  DD  alveolar stop
  '#b06020', // 5  kk  velar stop
  '#b06020', // 6  CH  affricate
  '#3060b0', // 7  SS  sibilant
  '#b06020', // 8  nn  nasal
  '#7030b0', // 9  RR  approximant
  '#309050', // 10 aa  vowel
  '#309050', // 11 E   vowel
  '#309050', // 12 ih  vowel
  '#309050', // 13 oh  vowel
  '#309050', // 14 ou  vowel
];

// Generate sliders
const slidersDiv = document.getElementById('sliders');
VISEMES.forEach(v => {
  slidersDiv.innerHTML += `
    <div class="v-row">
      <div class="v-id">${v.id}</div>
      <div class="v-name">${v.name}</div>
      <input type="range" class="v-slider" id="s-${v.id}" min="0" max="1" step="0.01" value="0" oninput="window.setViseme(${v.id}, this.value)">
      <div class="v-val" id="v-${v.id}">0.00</div>
    </div>
  `;
});

// ================================================================
// SCENE SETUP
// ================================================================
const viewport = document.getElementById('viewport');

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
viewport.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d1117);
scene.fog = new THREE.FogExp2(0x0d1117, 0.18);

const camera = new THREE.PerspectiveCamera(38, 1, 0.01, 50);
camera.position.set(0, 0.08, 2.4);
camera.lookAt(0, 0.05, 0);

function onResize() {
  const w = viewport.clientWidth;
  const h = viewport.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

// Lights
scene.add(new THREE.AmbientLight(0x3040608, 0.9));
const keyLight = new THREE.DirectionalLight(0xfff4e0, 1.4);
keyLight.position.set(1.5, 2.5, 2);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
scene.add(keyLight);
const fillLight = new THREE.DirectionalLight(0x6080c0, 0.35);
fillLight.position.set(-2, 0.5, 1.5);
scene.add(fillLight);
const rimLight = new THREE.DirectionalLight(0xffffff, 0.5);
rimLight.position.set(0, 1.5, -3);
scene.add(rimLight);
scene.add(new THREE.HemisphereLight(0x202030, 0x101018, 0.4));

// ================================================================
// HEAD & FEATURES GROUP
// ================================================================
const headGroup = new THREE.Group();
scene.add(headGroup);

// Materials
const skinMat     = new THREE.MeshStandardMaterial({ color: 0xf0b888, roughness: 0.72 });
const lipMat      = new THREE.MeshStandardMaterial({ color: 0x7a3020, roughness: 0.7 });
const lipVolMat   = new THREE.MeshStandardMaterial({ color: 0xc06050, roughness: 0.55 });
const innerMat    = new THREE.MeshStandardMaterial({ color: 0x1a0808, roughness: 1.0 });
const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.25 });
const irisMat     = new THREE.MeshStandardMaterial({ color: 0x3d6b99, roughness: 0.2 });
const pupilMat    = new THREE.MeshStandardMaterial({ color: 0x080810, roughness: 0.1 });
const browMat     = new THREE.MeshStandardMaterial({ color: 0x1a1008, roughness: 0.9 });
const teethMat    = new THREE.MeshStandardMaterial({ color: 0xf0ece0, roughness: 0.4 });

// Head / Neck / Shoulders
const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 40, 30), skinMat);
headMesh.scale.set(1.0, 1.18, 0.92); headMesh.castShadow = true; headGroup.add(headMesh);
const neckMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.19, 0.23, 0.38, 20), skinMat);
neckMesh.position.set(0, -0.54, -0.02); headGroup.add(neckMesh);
const shoulderMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.12, 0.45, 6, 12), new THREE.MeshStandardMaterial({ color: 0x1a2030, roughness: 0.85 }));
shoulderMesh.rotation.z = Math.PI / 2; shoulderMesh.position.set(0, -0.9, -0.1); shoulderMesh.scale.set(1, 1, 1.3); headGroup.add(shoulderMesh);

// Eyes (track lids for blinking)
const eyeLidMeshes = [];
function makeEye(side) {
  const g = new THREE.Group();
  g.add(new THREE.Mesh(new THREE.SphereGeometry(0.077, 16, 12), eyeWhiteMat));
  const iris = new THREE.Mesh(new THREE.CircleGeometry(0.042, 16), irisMat); iris.position.set(0, 0, 0.074); g.add(iris);
  const pupil = new THREE.Mesh(new THREE.CircleGeometry(0.024, 12), pupilMat); pupil.position.set(0, 0, 0.0755); g.add(pupil);
  const lid = new THREE.Mesh(new THREE.BoxGeometry(0.17, 0.018, 0.04), new THREE.MeshStandardMaterial({ color: 0xe0a080, roughness: 0.7 }));
  lid.position.set(0, 0.045, 0.05); lid.rotation.x = 0.25;
  eyeLidMeshes.push(lid); g.add(lid);
  g.position.set(side * 0.168, 0.07, 0.395); g.rotation.y = side * 0.12;
  return g;
}
headGroup.add(makeEye(-1)); headGroup.add(makeEye(1));

// Brows (track for expression)
const BROW_NEUTRAL_Y = 0.21;
function makeBrow(side) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.016, 0.025), browMat);
  m.position.set(side * 0.168, BROW_NEUTRAL_Y, 0.385); m.rotation.z = side * -0.1; m.rotation.x = -0.15;
  return m;
}
const browMeshL = makeBrow(-1); const browMeshR = makeBrow(1);
headGroup.add(browMeshL); headGroup.add(browMeshR);

// ================================================================
// MOUTH ASSEMBLY & MORPH TARGETS
// ================================================================
const MORPH_PARAMS = [
  { jawDrop:0.000, pucker:0.000,  cornerX:1.00 }, // 0  sil
  { jawDrop:0.000, pucker:0.008,  cornerX:0.88 }, // 1  PP
  { jawDrop:0.004, pucker:0.000,  cornerX:0.98 }, // 2  FF
  { jawDrop:0.010, pucker:0.000,  cornerX:1.00 }, // 3  TH
  { jawDrop:0.013, pucker:0.000,  cornerX:1.00 }, // 4  DD
  { jawDrop:0.016, pucker:-0.002, cornerX:1.00 }, // 5  kk
  { jawDrop:0.011, pucker:0.007,  cornerX:0.84 }, // 6  CH
  { jawDrop:0.005, pucker:0.000,  cornerX:1.32 }, // 7  SS
  { jawDrop:0.007, pucker:0.000,  cornerX:1.00 }, // 8  nn
  { jawDrop:0.019, pucker:0.004,  cornerX:0.88 }, // 9  RR
  { jawDrop:0.068, pucker:0.000,  cornerX:1.02 }, // 10 aa
  { jawDrop:0.023, pucker:0.000,  cornerX:1.42 }, // 11 E
  { jawDrop:0.009, pucker:0.000,  cornerX:1.26 }, // 12 ih
  { jawDrop:0.032, pucker:0.005,  cornerX:0.78 }, // 13 oh
  { jawDrop:0.016, pucker:0.013,  cornerX:0.70 }, // 14 ou
];

const mouthGroup = new THREE.Group(); mouthGroup.position.set(0, -0.228, 0.454); headGroup.add(mouthGroup);
const cavityMesh = new THREE.Mesh(new THREE.CircleGeometry(1, 20), innerMat);
cavityMesh.scale.set(0.072, 0.055, 1); cavityMesh.position.set(0, -0.004, -0.024); mouthGroup.add(cavityMesh);
const upperTeeth = new THREE.Mesh(new THREE.BoxGeometry(0.126, 0.016, 0.010), teethMat);
upperTeeth.position.set(0, 0.013, -0.016); mouthGroup.add(upperTeeth);

for (const side of [-1, 1]) {
  const lobe = new THREE.Mesh(new THREE.SphereGeometry(0.046, 16, 12), lipVolMat);
  lobe.scale.set(1.05, 0.43, 0.58); lobe.position.set(side * 0.033, 0.022, 0.010); mouthGroup.add(lobe);
}
const ulBridge = new THREE.Mesh(new THREE.SphereGeometry(0.030, 14, 10), lipVolMat);
ulBridge.scale.set(1.30, 0.30, 0.50); ulBridge.position.set(0, 0.015, 0.008); mouthGroup.add(ulBridge);

const jawGroup = new THREE.Group(); mouthGroup.add(jawGroup);
const lowerTeeth = new THREE.Mesh(new THREE.BoxGeometry(0.112, 0.015, 0.010), teethMat);
lowerTeeth.position.set(0, -0.014, -0.018); jawGroup.add(lowerTeeth);
const lowerLip = new THREE.Mesh(new THREE.SphereGeometry(0.062, 18, 12), lipVolMat);
lowerLip.scale.set(1.55, 0.52, 0.62); lowerLip.position.set(0, -0.026, 0.010); jawGroup.add(lowerLip);

function updateMouthTransforms() {
  let jawDrop = 0, pucker = 0, cornerX = 0;
  for (let i = 0; i < VISEMES.length; i++) {
    const w = currentW[i];
    if (w < 0.001) continue;
    const p = MORPH_PARAMS[i];
    jawDrop += p.jawDrop * w; pucker += p.pucker * w; cornerX += (p.cornerX - 1.0) * w;
  }
  jawGroup.position.y = -jawDrop * 1.6; jawGroup.rotation.x = jawDrop * 0.9;
  mouthGroup.position.z = 0.454 + pucker * 0.28;
  mouthGroup.scale.x = 1.0 + Math.max(-0.25, Math.min(0.42, cornerX)) * 0.18;
}

// ================================================================
// API & STATE
// ================================================================
let isSpeaking = false;
let fullTimeline = [];
let timelineDurationMs = 0;
let sentenceOffsetMs = 0;

// TTS active tracking for accurate visual playback
let globalStartTime = null; 
let fakeSeekOffsetMs = 0; // Enables clicking timeline without breaking audio

// Smoothing constraints
const LOOK_AHEAD_MS = 150 // was 80; high values gives more time for "muscle" transition
const MAX_TOTAL_WEIGHT = 1.2;

const targetW  = new Array(VISEMES.length).fill(0);
const currentW = new Array(VISEMES.length).fill(0);

// Expression State
let browRaiseCurrent = 0;
let browRaiseTarget  = 0;
let blinkNextTime = 0;
let isBlinking = false;
let blinkStartTime = 0;

// HUD State
let hudVisible = false;
let fpsSmooth = 60;
let lastFrameTime = performance.now();
let hudActiveViseme = 0;

window.setViseme = function (id, weight) {
  const w = Math.max(0, Math.min(1, weight));
  currentW[id] = w; targetW[id] = w;
  const s = document.getElementById('s-' + id); const v = document.getElementById('v-' + id);
  if (s) { s.value = w; v.textContent = w.toFixed(2); }
};
window.resetVisemes = function () {
  for (let i = 0; i < VISEMES.length; i++) {
    currentW[i] = 0; targetW[i] = 0;
    const s = document.getElementById('s-' + i); const v = document.getElementById('v-' + i);
    if (s) { s.value = 0; v.textContent = '0.00'; }
  }
};
function setStatus(text, cls) {
  const el = document.getElementById('status-label');
  el.textContent = text; el.className = 'status-' + cls;
}

// ================================================================
// TTS & MULTI-SENTENCE QUEUE
// ================================================================
document.getElementById('speak-btn').addEventListener('click', async () => {
  const text = document.getElementById('tts-text').value.trim();
  if (!text) return;
  if (!window.SpeechSDK || !AZURE_SPEECH_KEY) { setStatus('SDK/Key error', 'error'); return; }

  // Split on sentence boundaries (period+space) or newlines
  const sentences = text.split(/(?<=[.!?])\s+|\n+/).map(s => s.trim()).filter(s => s.length > 0);
  
  document.getElementById('speak-btn').disabled = true;
  document.getElementById('export-btn').disabled = true;
  document.getElementById('timeline-wrap').style.display = 'block';

  fullTimeline = [];
  timelineDurationMs = 0;
  sentenceOffsetMs = 0;
  globalStartTime = null;
  fakeSeekOffsetMs = 0;

  try {
    const config = SpeechSDK.SpeechConfig.fromSubscription(AZURE_SPEECH_KEY, AZURE_SPEECH_REGION);
    config.speechSynthesisVoiceName = 'en-US-JennyNeural';

    for (let i = 0; i < sentences.length; i++) {
      if (i > 0) {
        setStatus('Pause...', 'loading');
        await new Promise(r => setTimeout(r, 400)); // 400ms pause between sentences
        sentenceOffsetMs += 400; 
      }
      
      setStatus(`Speaking (${i+1}/${sentences.length})`, 'speaking');
      await synthesizeSentence(sentences[i], config);
    }
    
    setStatus('Done', 'done');
    isSpeaking = false;
    browRaiseTarget = 0; // Return brows to neutral
    document.getElementById('export-btn').disabled = false;
  } catch (err) {
    setStatus('Error', 'error');
    console.error(err);
  } finally {
    document.getElementById('speak-btn').disabled = false;
  }
});

function synthesizeSentence(text, config) {
  return new Promise((resolve, reject) => {
    const audioConfig = SpeechSDK.AudioConfig.fromDefaultSpeakerOutput();
    const synth = new SpeechSDK.SpeechSynthesizer(config, audioConfig);
    
    let localDuration = 0;

    synth.visemeReceived = (s, e) => {
      const localMs = e.audioOffset / 10000;
      fullTimeline.push({
        timeMs: sentenceOffsetMs + localMs,
        visemeId: e.visemeId
      });
    };

    synth.synthesisStarted = (s, e) => {
      isSpeaking = true;
      browRaiseTarget = 0.022; // Raise eyebrows while speaking
      if (globalStartTime === null) globalStartTime = performance.now();
    };

    synth.speakTextAsync(text, 
      (result) => {
        if (result.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted) {
          localDuration = result.audioDuration ? (result.audioDuration / 10000) : 1000;
          timelineDurationMs = sentenceOffsetMs + localDuration;
          sentenceOffsetMs += localDuration;
          
          // Wait for audio to actually finish playing before resolving
          setTimeout(() => {
            synth.close();
            resolve();
          }, localDuration);
        } else {
          synth.close();
          reject('Synthesis failed');
        }
      },
      (err) => { synth.close(); reject(err); }
    );
  });
}

// ================================================================
// TIMELINE CANVAS & EXPORT
// ================================================================
const tlCanvas = document.getElementById('timeline-canvas');
const tlCtx = tlCanvas.getContext('2d');

function resizeTimeline() {
  tlCanvas.width = tlCanvas.offsetWidth * window.devicePixelRatio;
  tlCanvas.height = tlCanvas.offsetHeight * window.devicePixelRatio;
}
window.addEventListener('resize', resizeTimeline);
resizeTimeline();

tlCanvas.addEventListener('click', (e) => {
  if (!timelineDurationMs || fullTimeline.length === 0) return;
  const rect = tlCanvas.getBoundingClientRect();
  const fraction = (e.clientX - rect.left) / rect.width;
  const targetMs = fraction * timelineDurationMs;
  
  if (globalStartTime !== null) {
    // Fake seek: adjust the animation timer so visuals jump, 
    // even though Azure SDK audio continues from its native buffer.
    const currentRealElapsed = performance.now() - globalStartTime;
    fakeSeekOffsetMs = targetMs - currentRealElapsed;
  }
});

document.getElementById('export-btn').addEventListener('click', () => {
  const data = {
    text: document.getElementById('tts-text').value.trim(),
    durationMs: Math.round(timelineDurationMs),
    visemes: fullTimeline.map(v => ({
      timeMs: Math.round(v.timeMs),
      visemeId: v.visemeId,
      visemeName: VISEMES[v.visemeId].name
    }))
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'viseme_timeline.json'; a.click();
  URL.revokeObjectURL(url);
});

function drawTimeline(elapsedMs) {
  const W = tlCanvas.width;
  const H = tlCanvas.height;
  tlCtx.clearRect(0, 0, W, H);

  if (fullTimeline.length === 0 || timelineDurationMs === 0) return;

  tlCtx.fillStyle = '#0a0d11';
  tlCtx.fillRect(0, 0, W, H);

  // Viseme blocks
  for (let i = 0; i < fullTimeline.length; i++) {
    const startMs = fullTimeline[i].timeMs;
    const endMs = i + 1 < fullTimeline.length ? fullTimeline[i + 1].timeMs : timelineDurationMs;
    const x1 = (startMs / timelineDurationMs) * W;
    const x2 = (endMs / timelineDurationMs) * W;
    const bw = x2 - x1;
    const id = fullTimeline[i].visemeId;

    tlCtx.fillStyle = VISEME_COLORS[id] || '#555';
    tlCtx.fillRect(x1 + 0.5, 2, Math.max(1, bw - 1), H - 4);

    if (bw > 18 * window.devicePixelRatio) {
      tlCtx.save();
      tlCtx.fillStyle = 'rgba(255,255,255,0.55)';
      tlCtx.font = `${Math.round(9 * window.devicePixelRatio)}px monospace`;
      tlCtx.textAlign = 'center';
      tlCtx.textBaseline = 'middle';
      tlCtx.fillText(VISEMES[id].name, x1 + bw / 2, H / 2);
      tlCtx.restore();
    }
  }

  // Playhead
  if (globalStartTime !== null) {
    const px = (elapsedMs / timelineDurationMs) * W;
    tlCtx.fillStyle = '#fff';
    tlCtx.fillRect(px - 1, 0, 2, H);
  }
}

// ================================================================
// HUD TOGGLE
// ================================================================
document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'd') {
    hudVisible = !hudVisible;
    document.getElementById('dbg-overlay').style.display = hudVisible ? 'block' : 'none';
  }
});

// ================================================================
// MAIN ANIMATION LOOP
// ================================================================
let prevTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - prevTime) / 1000;
  prevTime = now;

  // Track global elapsed time for timeline and lookahead
  let elapsedMs = 0;
  if (globalStartTime !== null) {
    elapsedMs = (now - globalStartTime) + fakeSeekOffsetMs;
  }

  // 1. Blend Expressions (Blink & Brows)
  if (now > blinkNextTime && !isBlinking) {
    isBlinking = true;
    blinkStartTime = now;
  }
  if (isBlinking) {
    const t = (now - blinkStartTime) / 150; // 150ms blink cycle
    if (t >= 1) {
      isBlinking = false;
      blinkNextTime = now + 3000 + Math.random() * 4000; // 3-7 sec
      eyeLidMeshes.forEach(m => m.position.y = 0.045);
    } else {
      const drop = Math.sin(t * Math.PI) * 0.02; // Close half-way to simulate fast blink
      eyeLidMeshes.forEach(m => m.position.y = 0.045 - drop);
    }
  }

  browRaiseCurrent += (browRaiseTarget - browRaiseCurrent) * (dt * 8);
  browMeshL.position.y = BROW_NEUTRAL_Y + browRaiseCurrent;
  browMeshR.position.y = BROW_NEUTRAL_Y + browRaiseCurrent;

  // 2. Viseme Smoothing & Look-Ahead
  if (isSpeaking && fullTimeline.length > 0 && elapsedMs < timelineDurationMs + 150) {
    
    // Find current viseme index
    let curIdx = 0;
    let lo = 0, hi = fullTimeline.length - 1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (fullTimeline[mid].timeMs <= elapsedMs) { curIdx = mid; lo = mid + 1; }
      else { hi = mid - 1; }
    }
    const curId = fullTimeline[curIdx].visemeId;
    hudActiveViseme = curId;

    // Look-ahead cross-fade
    let nextId = curId;
    let nextTimeMs = Infinity;
    for (let j = curIdx + 1; j < fullTimeline.length; j++) {
      if (fullTimeline[j].visemeId !== curId) {
        nextId = fullTimeline[j].visemeId;
        nextTimeMs = fullTimeline[j].timeMs;
        break;
      }
    }

    for (let i = 0; i < VISEMES.length; i++) targetW[i] = 0;

    const timeUntilNext = nextTimeMs - elapsedMs;
    if (nextId !== curId && timeUntilNext > 0 && timeUntilNext < LOOK_AHEAD_MS) {
      const blend = 1.0 - (timeUntilNext / LOOK_AHEAD_MS);
      targetW[curId] = 1.0 - blend;
      targetW[nextId] = blend;
    } else {
      targetW[curId] = 1.0;
    }

    // Clamp total target weight
    let totalTarget = 0;
    for (let i = 0; i < VISEMES.length; i++) totalTarget += targetW[i];
    if (totalTarget > MAX_TOTAL_WEIGHT) {
      const scale = MAX_TOTAL_WEIGHT / totalTarget;
      for (let i = 0; i < VISEMES.length; i++) targetW[i] *= scale;
    }

  } else if (!isSpeaking) {
    for (let i = 0; i < VISEMES.length; i++) targetW[i] = 0;
  }

  // Lerp & Clamp current weights
  let anyNonZero = false;
  let curTotal = 0;
  for (let i = 0; i < VISEMES.length; i++) {
    const speed = targetW[i] > currentW[i] ? 10 : 7 // 15 : 12; // Snappier attack
    currentW[i] += (targetW[i] - currentW[i]) * Math.min(1.0, speed * dt);
    if (currentW[i] < 0.0005) currentW[i] = 0;
    if (currentW[i] > 0) anyNonZero = true;
    curTotal += currentW[i];
  }

  if (curTotal > MAX_TOTAL_WEIGHT) {
    const scale = MAX_TOTAL_WEIGHT / curTotal;
    for (let i = 0; i < VISEMES.length; i++) currentW[i] *= scale;
  }

  updateMouthTransforms();

  // Sync sliders if panel is open
  if ((isSpeaking || anyNonZero) && document.getElementById('debug-panel').open) {
    for (let i = 0; i < VISEMES.length; i++) {
      const s = document.getElementById('s-' + i);
      const v = document.getElementById('v-' + i);
      if (s) { s.value = currentW[i]; v.textContent = currentW[i].toFixed(2); }
    }
  }

  // 3. Update Canvas Timeline
  drawTimeline(elapsedMs);

  // 4. Update HUD Debug
  if (hudVisible) {
    fpsSmooth += ((1000 / (now - lastFrameTime)) - fpsSmooth) * 0.1;
    document.getElementById('dbg-fps').textContent = Math.round(fpsSmooth);
    
    if (isSpeaking && globalStartTime !== null) {
      document.getElementById('dbg-time').textContent = Math.max(0, elapsedMs).toFixed(0) + ' ms';
    } else {
      document.getElementById('dbg-time').textContent = '---';
    }
    
    const activeName = VISEMES[hudActiveViseme] ? VISEMES[hudActiveViseme].name : '---';
    document.getElementById('dbg-viseme').textContent = `${hudActiveViseme} (${activeName})`;
    document.getElementById('dbg-weight').textContent = currentW[hudActiveViseme].toFixed(3);
  }
  lastFrameTime = now;

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
