<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Avatar — SVG Lip Sync</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5ede3;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── TTS Panel ── */
#tts-panel {
  background: #fff;
  border-bottom: 2px solid #e0d5c8;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  z-index: 10;
}
#tts-text {
  flex: 1;
  min-height: 44px;
  max-height: 80px;
  background: #faf8f5;
  color: #333;
  border: 1px solid #d0c8be;
  border-radius: 6px;
  padding: 8px 10px;
  font-family: inherit;
  font-size: 13px;
  resize: vertical;
}
#tts-text:focus { outline: none; border-color: #7a9ec7; }
#speak-btn {
  padding: 8px 24px;
  background: #4a8bc2;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  transition: background 0.15s;
}
#speak-btn:hover:not(:disabled) { background: #3a7ab2; }
#speak-btn:disabled { background: #bbb; cursor: not-allowed; }
#status-label {
  font-size: 12px;
  width: 100px;
  text-align: center;
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid #d0c8be;
  color: #999;
  flex-shrink: 0;
}
.status-idle     { color: #999; border-color: #d0c8be; }
.status-loading  { color: #c89020; border-color: #c89020; }
.status-speaking { color: #3a9050; border-color: #3a9050; }
.status-done     { color: #4a8bc2; border-color: #4a8bc2; }
.status-error    { color: #c04040; border-color: #c04040; }

/* ── Timeline ── */
#timeline-wrap {
  background: #e8e0d5;
  border-bottom: 1px solid #d0c8be;
  height: 32px;
  display: none;
  position: relative;
  cursor: crosshair;
  flex-shrink: 0;
}
#timeline-canvas { display: block; width: 100%; height: 100%; }

/* ── Viewport ── */
#viewport {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  background: #f5ede3;
  position: relative;
}
#avatar-svg {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
}

/* ── Debug panel ── */
#debug-panel {
  background: #fff;
  border-top: 2px solid #e0d5c8;
  flex-shrink: 0;
  max-height: 200px;
  overflow-y: auto;
}
#debug-panel summary {
  padding: 6px 16px;
  color: #888;
  font-size: 11px;
  cursor: pointer;
  user-select: none;
}
#debug-info {
  padding: 4px 16px 10px;
  font-size: 12px;
  color: #555;
  font-family: 'Courier New', monospace;
}
.viseme-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin: 1px 0;
  height: 18px;
}
.viseme-bar .v-name { width: 30px; font-size: 10px; color: #888; text-align: right; }
.viseme-bar .v-fill { height: 10px; background: #4a8bc2; border-radius: 2px; transition: width 0.05s; }
.viseme-bar .v-val { font-size: 10px; color: #aaa; width: 34px; }
</style>
</head>
<body>

<div id="tts-panel">
  <textarea id="tts-text">Hello! I'm your 2D avatar assistant. I can move my mouth to match the words I'm saying. Try typing a sentence and press Speak!</textarea>
  <button id="speak-btn">Speak</button>
  <span id="status-label" class="status-idle">Idle</span>
</div>

<div id="timeline-wrap">
  <canvas id="timeline-canvas" height="32"></canvas>
</div>

<div id="viewport">

    <!-- Hair flowing right -->

    <!-- Hair flowing left -->

    <!-- ══════ EYEBROWS ══════ -->

    <!-- Upper eyelid -->

<script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle.js"></script>
<script src="../../config.js" onerror="console.warn('config.js not found — Azure TTS unavailable')"></script>
<script>
// ================================================================
// AZURE CONFIG
// ================================================================
const AZURE_SPEECH_KEY    = (window.AZURE_CONFIG && window.AZURE_CONFIG.key)    || '';
const AZURE_SPEECH_REGION = (window.AZURE_CONFIG && window.AZURE_CONFIG.region) || '';

// ================================================================
// VISEME DEFINITIONS (Azure IDs 0–14)
// ================================================================
const VISEMES = [
  { id:  0, name: 'sil' },
  { id:  1, name: 'PP'  },  // B, M, P
  { id:  2, name: 'FF'  },  // F, V
  { id:  3, name: 'TH'  },  // Th
  { id:  4, name: 'DD'  },  // D, T
  { id:  5, name: 'kk'  },  // K, G
  { id:  6, name: 'CH'  },  // Ch, J, Sh
  { id:  7, name: 'SS'  },  // S, Z
  { id:  8, name: 'nn'  },  // N
  { id:  9, name: 'RR'  },  // R
  { id: 10, name: 'aa'  },  // A (wide open)
  { id: 11, name: 'E'   },  // E (wide smile)
  { id: 12, name: 'ih'  },  // I (slight open)
  { id: 13, name: 'oh'  },  // O (rounded open)
  { id: 14, name: 'ou'  },  // U (pucker)
];

// ================================================================
// MOUTH SHAPE DEFINITIONS
// Each viseme maps to SVG path parameters for the mouth
// Format: { upperLip, lowerLip, cavity, jawDrop, lipWidth,
//           teethShow, tongueShow, lipPucker }
// Coordinates are relative offsets from the neutral mouth center (200, 300)
// ================================================================
const MOUTH_CENTER_X = 200;
const MOUTH_CENTER_Y = 300;
const NEUTRAL_WIDTH = 28; // half-width from center

const MOUTH_SHAPES = {
  // 0: sil — closed, relaxed
  0: {
    jawDrop: 0,
    lipWidth: 28,
    lipPucker: 0,
    upperCurve: -2,
    lowerCurve: 2,
    cornerY: 0,
    teethUpperShow: 0,
    teethLowerShow: 0,
    tongueShow: 0,
    tongueTip: 0,      // tongue tip poking between lips (for TH)
    mouthOpen: 0,
  },
  // 1: PP — lips pressed together (B, M, P)
  1: {
    jawDrop: 0,
    lipWidth: 26,
    lipPucker: 2,
    upperCurve: -1,
    lowerCurve: 1,
    cornerY: -1,
    teethUpperShow: 0,
    teethLowerShow: 0,
    tongueShow: 0,
    tongueTip: 0,
    mouthOpen: 0,
  },
  // 2: FF — lower lip tucked under upper teeth (F, V)
  2: {
    jawDrop: 2,
    lipWidth: 27,
    lipPucker: 0,
    upperCurve: -1,
    lowerCurve: 0.5,   // lower lip pulled in
    cornerY: 0,
    teethUpperShow: 1,
    teethLowerShow: 0,
    tongueShow: 0,
    tongueTip: 0,
    mouthOpen: 3,
  },
  // 3: TH — tongue tip between teeth, visible poking out
  3: {
    jawDrop: 3,
    lipWidth: 26,
    lipPucker: 0,
    upperCurve: -2,
    lowerCurve: 2,
    cornerY: 0,
    teethUpperShow: 0.8,
    teethLowerShow: 0.5,
    tongueShow: 1,      // tongue visible inside mouth
    tongueTip: 1,       // tongue tip pokes out between lips
    mouthOpen: 5,
  },
  // 4: DD — mouth open, tongue touches ridge (D, T)
  4: {
    jawDrop: 4,
    lipWidth: 26,
    lipPucker: 0,
    upperCurve: -2,
    lowerCurve: 3,
    cornerY: 0,
    teethUpperShow: 0.8,
    teethLowerShow: 0.4,
    tongueShow: 0.6,
    tongueTip: 0,
    mouthOpen: 6,
  },
  // 5: kk — mouth open, back of tongue raised (K, G)
  5: {
    jawDrop: 5,
    lipWidth: 25,
    lipPucker: 0,
    upperCurve: -3,
    lowerCurve: 4,
    cornerY: 0,
    teethUpperShow: 0.7,
    teethLowerShow: 0.4,
    tongueShow: 0.3,
    tongueTip: 0,
    mouthOpen: 8,
  },
  // 6: CH — rounded, slightly open (Ch, J, Sh)
  6: {
    jawDrop: 3,
    lipWidth: 22,
    lipPucker: 3,
    upperCurve: -3,
    lowerCurve: 3,
    cornerY: 0,
    teethUpperShow: 0.7,
    teethLowerShow: 0.4,
    tongueShow: 0.2,
    tongueTip: 0,
    mouthOpen: 6,
  },
  // 7: SS — teeth visible, wide (S, Z)
  7: {
    jawDrop: 1,
    lipWidth: 30,
    lipPucker: 0,
    upperCurve: -1,
    lowerCurve: 1,
    cornerY: 1,
    teethUpperShow: 1,
    teethLowerShow: 0.9,
    tongueShow: 0.2,
    tongueTip: 0,
    mouthOpen: 3,
  },
  // 8: nn — slightly open (N)
  8: {
    jawDrop: 2,
    lipWidth: 26,
    lipPucker: 0,
    upperCurve: -2,
    lowerCurve: 2,
    cornerY: 0,
    teethUpperShow: 0.6,
    teethLowerShow: 0.3,
    tongueShow: 0.4,
    tongueTip: 0,
    mouthOpen: 4,
  },
  // 9: RR — rounded medium, tongue curled (R)
  9: {
    jawDrop: 4,
    lipWidth: 22,
    lipPucker: 3,
    upperCurve: -3,
    lowerCurve: 4,
    cornerY: 0,
    teethUpperShow: 0.5,
    teethLowerShow: 0.3,
    tongueShow: 0.7,
    tongueTip: 0,
    mouthOpen: 7,
  },
  // 10: aa — wide open, tongue flat (A)
  10: {
    jawDrop: 10,
    lipWidth: 28,
    lipPucker: 0,
    upperCurve: -4,
    lowerCurve: 8,
    cornerY: 0,
    teethUpperShow: 1,
    teethLowerShow: 0.6,
    tongueShow: 0.7,
    tongueTip: 0,
    mouthOpen: 14,
  },
  // 11: E — wide smile, teeth showing (E)
  11: {
    jawDrop: 5,
    lipWidth: 32,
    lipPucker: 0,
    upperCurve: -3,
    lowerCurve: 5,
    cornerY: 2,
    teethUpperShow: 1,
    teethLowerShow: 0.6,
    tongueShow: 0.4,
    tongueTip: 0,
    mouthOpen: 9,
  },
  // 12: ih — slightly open, wide (I)
  12: {
    jawDrop: 2,
    lipWidth: 30,
    lipPucker: 0,
    upperCurve: -2,
    lowerCurve: 2,
    cornerY: 1,
    teethUpperShow: 0.9,
    teethLowerShow: 0.4,
    tongueShow: 0.2,
    tongueTip: 0,
    mouthOpen: 4,
  },
  // 13: oh — rounded open (O)
  13: {
    jawDrop: 7,
    lipWidth: 20,
    lipPucker: 4,
    upperCurve: -4,
    lowerCurve: 6,
    cornerY: -1,
    teethUpperShow: 0.6,
    teethLowerShow: 0.4,
    tongueShow: 0.5,
    tongueTip: 0,
    mouthOpen: 11,
  },
  // 14: ou — small rounded pucker (U, Q, W)
  14: {
    jawDrop: 3,
    lipWidth: 16,
    lipPucker: 6,
    upperCurve: -4,
    lowerCurve: 4,
    cornerY: -1,
    teethUpperShow: 0.3,
    teethLowerShow: 0,
    tongueShow: 0.1,
    tongueTip: 0,
    mouthOpen: 5,
  },
};

// ================================================================
// SVG ELEMENT REFERENCES
// ================================================================
const svgEl = document.getElementById('avatar-svg');
const upperLipEl  = document.getElementById('upper-lip');
const lowerLipEl  = document.getElementById('lower-lip');
const cupidsBowEl = document.getElementById('cupids-bow');
const cavityEl    = document.getElementById('mouth-cavity');
const clipPathEl  = document.getElementById('mouthClipPath');
const teethUpperEl = document.getElementById('teeth-upper');
const teethLowerEl = document.getElementById('teeth-lower');
const tongueEl    = document.getElementById('tongue');
const tongueTipEl = document.getElementById('tongue-tip');
const browLEl     = document.getElementById('browL');
const browREl     = document.getElementById('browR');

// ================================================================
// MOUTH RENDERING
// ================================================================
// Current blended shape (interpolated values)
const currentShape = { ...MOUTH_SHAPES[0] };

function lerpShape(out, a, b, t) {
  for (const key in a) {
    out[key] = a[key] + (b[key] - a[key]) * t;
  }
}

function blendShapes(weights) {
  // Reset to zero
  for (const key in currentShape) currentShape[key] = 0;

  // Weighted sum of all active visemes
  for (let i = 0; i < VISEMES.length; i++) {
    const w = weights[i];
    if (w < 0.001) continue;
    const shape = MOUTH_SHAPES[i];
    for (const key in shape) {
      currentShape[key] += shape[key] * w;
    }
  }
}

function applyMouthShape() {
  const cx = MOUTH_CENTER_X;
  const cy = MOUTH_CENTER_Y;
  const s = currentShape;

  const hw = s.lipWidth;              // half-width from center
  const drop = s.jawDrop;             // how far jaw drops
  const open = s.mouthOpen;           // mouth opening height
  const pucker = s.lipPucker;         // lip protrusion/rounding
  const uCurve = s.upperCurve;        // upper lip curvature
  const lCurve = s.lowerCurve;        // lower lip curvature
  const cY = s.cornerY;              // corner smile/frown offset

  const leftX = cx - hw;
  const rightX = cx + hw;
  const cornerYL = cy + cY;
  const cornerYR = cy + cY;

  // ── Upper lip ──
  const upperMidY = cy - 2 + uCurve - (open * 0.15);
  const lipThickness = 1 + pucker * 0.3;
  upperLipEl.setAttribute('d',
    `M ${leftX},${cornerYL} ` +
    `Q ${cx - hw * 0.5},${upperMidY} ${cx},${upperMidY - 1} ` +
    `Q ${cx + hw * 0.5},${upperMidY} ${rightX},${cornerYR}`
  );
  upperLipEl.setAttribute('stroke-width', lipThickness);

  // Cupid's bow
  const bowY = upperMidY + 1;
  cupidsBowEl.setAttribute('d',
    `M ${cx - 12},${bowY + 2} Q ${cx - 4},${bowY - 1} ${cx},${bowY + 1} Q ${cx + 4},${bowY - 1} ${cx + 12},${bowY + 2}`
  );

  // ── Lower lip ──
  const lowerMidY = cy + drop + lCurve + (open * 0.6);
  lowerLipEl.setAttribute('d',
    `M ${leftX},${cornerYL} ` +
    `Q ${cx - hw * 0.4},${lowerMidY} ${cx},${lowerMidY + 2} ` +
    `Q ${cx + hw * 0.4},${lowerMidY} ${rightX},${cornerYR}`
  );
  lowerLipEl.setAttribute('stroke-width', lipThickness);

  // ── Mouth cavity (dark interior) ──
  const cavTopY = upperMidY + 2;
  const cavBotY = lowerMidY - 1;
  if (open > 0.5) {
    cavityEl.setAttribute('d',
      `M ${leftX + 3},${cornerYL} ` +
      `Q ${cx},${cavTopY} ${rightX - 3},${cornerYR} ` +
      `Q ${cx},${cavBotY} ${leftX + 3},${cornerYL} Z`
    );
    cavityEl.setAttribute('opacity', '1');
  } else {
    cavityEl.setAttribute('opacity', '0');
  }

  // ── Clip path (constrains teeth + tongue to mouth opening) ──
  clipPathEl.setAttribute('d',
    `M ${leftX + 2},${cornerYL} ` +
    `Q ${cx},${cavTopY - 1} ${rightX - 2},${cornerYR} ` +
    `Q ${cx},${cavBotY + 1} ${leftX + 2},${cornerYL} Z`
  );

  // ── Tongue (inside mouth, behind teeth) ──
  const tongueW = Math.max(4, hw * 0.45);
  const tongueH = Math.max(2, open * 0.35);
  const tongueCY = cavBotY - tongueH * 0.4;
  tongueEl.setAttribute('cx', cx);
  tongueEl.setAttribute('cy', tongueCY);
  tongueEl.setAttribute('rx', tongueW);
  tongueEl.setAttribute('ry', tongueH);
  tongueEl.setAttribute('opacity', open > 0.5 ? s.tongueShow : 0);

  // ── Upper teeth ──
  const teethW = hw * 1.4;
  const teethH = Math.min(8, Math.max(3, open * 0.6));
  teethUpperEl.setAttribute('x', cx - teethW / 2);
  teethUpperEl.setAttribute('y', cavTopY);
  teethUpperEl.setAttribute('width', teethW);
  teethUpperEl.setAttribute('height', teethH);
  teethUpperEl.setAttribute('opacity', open > 0.5 ? s.teethUpperShow : 0);

  // ── Lower teeth ──
  const lTeethH = Math.min(7, Math.max(2, open * 0.5));
  teethLowerEl.setAttribute('x', cx - teethW * 0.45);
  teethLowerEl.setAttribute('y', cavBotY - lTeethH);
  teethLowerEl.setAttribute('width', teethW * 0.9);
  teethLowerEl.setAttribute('height', lTeethH);
  teethLowerEl.setAttribute('opacity', open > 0.5 ? s.teethLowerShow : 0);

  // ── Tongue tip (pokes out between lips for TH) ──
  // Positioned at the lip line, between upper and lower lip
  const tipY = (upperMidY + cornerYL) * 0.5 + 2;
  tongueTipEl.setAttribute('cx', cx);
  tongueTipEl.setAttribute('cy', tipY);
  tongueTipEl.setAttribute('rx', Math.min(10, hw * 0.3));
  tongueTipEl.setAttribute('ry', 3);
  tongueTipEl.setAttribute('opacity', s.tongueTip);
}

// ================================================================
// VISEME STATE & ANIMATION
// ================================================================
const LOOK_AHEAD_MS = 150;
const MAX_TOTAL_WEIGHT = 1.2;

const targetW  = new Float32Array(VISEMES.length);
const currentW = new Float32Array(VISEMES.length);

let isSpeaking = false;
let fullTimeline = [];
let timelineDurationMs = 0;
let sentenceOffsetMs = 0;
let globalStartTime = null;
let fakeSeekOffsetMs = 0;

// Blink state
let blinkNextTime = performance.now() + 2000 + Math.random() * 3000;
let isBlinking = false;
let blinkStartTime = 0;
let browRaiseCurrent = 0;
let browRaiseTarget = 0;

// ================================================================
// DEBUG PANEL
// ================================================================
const debugInfo = document.getElementById('debug-info');
let debugHTML = '';
for (const v of VISEMES) {
  debugHTML += `<div class="viseme-bar"><span class="v-name">${v.name}</span><div class="v-fill" id="bar-${v.id}" style="width:0px"></div><span class="v-val" id="val-${v.id}">0.00</span></div>`;
}
debugInfo.innerHTML = debugHTML;

// ================================================================
// STATUS
// ================================================================
function setStatus(text, cls) {
  const el = document.getElementById('status-label');
  el.textContent = text;
  el.className = 'status-' + cls;
}

// ================================================================
// TTS
// ================================================================
document.getElementById('speak-btn').addEventListener('click', async () => {
  const text = document.getElementById('tts-text').value.trim();
  if (!text) return;
  if (!window.SpeechSDK || !AZURE_SPEECH_KEY) {
    setStatus('SDK/Key err', 'error');
    return;
  }

  const sentences = text.split(/(?<=[.!?])\s+|\n+/).map(s => s.trim()).filter(s => s.length > 0);

  document.getElementById('speak-btn').disabled = true;
  document.getElementById('timeline-wrap').style.display = 'block';

  fullTimeline = [];
  timelineDurationMs = 0;
  sentenceOffsetMs = 0;
  globalStartTime = null;
  fakeSeekOffsetMs = 0;

  try {
    const config = SpeechSDK.SpeechConfig.fromSubscription(AZURE_SPEECH_KEY, AZURE_SPEECH_REGION);
    config.speechSynthesisVoiceName = 'en-US-JennyNeural';

    for (let i = 0; i < sentences.length; i++) {
      if (i > 0) {
        setStatus('Pause...', 'loading');
        await new Promise(r => setTimeout(r, 400));
        sentenceOffsetMs += 400;
      }
      setStatus(`Speaking ${i + 1}/${sentences.length}`, 'speaking');
      await synthesizeSentence(sentences[i], config);
    }

    setStatus('Done', 'done');
    isSpeaking = false;
    browRaiseTarget = 0;
  } catch (err) {
    setStatus('Error', 'error');
    console.error(err);
  } finally {
    document.getElementById('speak-btn').disabled = false;
  }
});

function synthesizeSentence(text, config) {
  return new Promise((resolve, reject) => {
    const audioConfig = SpeechSDK.AudioConfig.fromDefaultSpeakerOutput();
    const synth = new SpeechSDK.SpeechSynthesizer(config, audioConfig);

    synth.visemeReceived = (s, e) => {
      const localMs = e.audioOffset / 10000;
      fullTimeline.push({
        timeMs: sentenceOffsetMs + localMs,
        visemeId: e.visemeId
      });
    };

    synth.synthesisStarted = () => {
      isSpeaking = true;
      browRaiseTarget = 0.5;
      if (globalStartTime === null) globalStartTime = performance.now();
    };

    synth.speakTextAsync(text,
      (result) => {
        if (result.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted) {
          const localDuration = result.audioDuration ? (result.audioDuration / 10000) : 1000;
          timelineDurationMs = sentenceOffsetMs + localDuration;
          sentenceOffsetMs += localDuration;
          setTimeout(() => { synth.close(); resolve(); }, localDuration);
        } else {
          synth.close();
          reject('Synthesis failed');
        }
      },
      (err) => { synth.close(); reject(err); }
    );
  });
}

// ================================================================
// TIMELINE CANVAS
// ================================================================
const tlCanvas = document.getElementById('timeline-canvas');
const tlCtx = tlCanvas.getContext('2d');

const VISEME_COLORS = [
  '#888',    // 0  sil
  '#c04040', // 1  PP
  '#4060b0', // 2  FF
  '#4060b0', // 3  TH
  '#b07030', // 4  DD
  '#b07030', // 5  kk
  '#b07030', // 6  CH
  '#4060b0', // 7  SS
  '#b07030', // 8  nn
  '#8040b0', // 9  RR
  '#40a060', // 10 aa
  '#40a060', // 11 E
  '#40a060', // 12 ih
  '#40a060', // 13 oh
  '#40a060', // 14 ou
];

function resizeTimeline() {
  tlCanvas.width = tlCanvas.offsetWidth * window.devicePixelRatio;
  tlCanvas.height = tlCanvas.offsetHeight * window.devicePixelRatio;
}
window.addEventListener('resize', resizeTimeline);
resizeTimeline();

tlCanvas.addEventListener('click', (e) => {
  if (!timelineDurationMs || fullTimeline.length === 0) return;
  const rect = tlCanvas.getBoundingClientRect();
  const fraction = (e.clientX - rect.left) / rect.width;
  const targetMs = fraction * timelineDurationMs;
  if (globalStartTime !== null) {
    const currentRealElapsed = performance.now() - globalStartTime;
    fakeSeekOffsetMs = targetMs - currentRealElapsed;
  }
});

function drawTimeline(elapsedMs) {
  const W = tlCanvas.width;
  const H = tlCanvas.height;
  tlCtx.clearRect(0, 0, W, H);
  if (fullTimeline.length === 0 || timelineDurationMs === 0) return;

  tlCtx.fillStyle = '#e8e0d5';
  tlCtx.fillRect(0, 0, W, H);

  for (let i = 0; i < fullTimeline.length; i++) {
    const startMs = fullTimeline[i].timeMs;
    const endMs = i + 1 < fullTimeline.length ? fullTimeline[i + 1].timeMs : timelineDurationMs;
    const x1 = (startMs / timelineDurationMs) * W;
    const x2 = (endMs / timelineDurationMs) * W;
    const bw = x2 - x1;
    const id = fullTimeline[i].visemeId;

    tlCtx.fillStyle = VISEME_COLORS[id] || '#555';
    tlCtx.fillRect(x1 + 0.5, 2, Math.max(1, bw - 1), H - 4);

    if (bw > 18 * window.devicePixelRatio) {
      tlCtx.save();
      tlCtx.fillStyle = 'rgba(255,255,255,0.7)';
      tlCtx.font = `${Math.round(9 * window.devicePixelRatio)}px monospace`;
      tlCtx.textAlign = 'center';
      tlCtx.textBaseline = 'middle';
      tlCtx.fillText(VISEMES[id].name, x1 + bw / 2, H / 2);
      tlCtx.restore();
    }
  }

  if (globalStartTime !== null) {
    const px = (elapsedMs / timelineDurationMs) * W;
    tlCtx.fillStyle = '#333';
    tlCtx.fillRect(px - 1, 0, 2, H);
  }
}

// ================================================================
// MAIN ANIMATION LOOP
// ================================================================
let prevTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - prevTime) / 1000;
  prevTime = now;

  let elapsedMs = 0;
  if (globalStartTime !== null) {
    elapsedMs = (now - globalStartTime) + fakeSeekOffsetMs;
  }

  // ── Blink ──
  if (now > blinkNextTime && !isBlinking) {
    isBlinking = true;
    blinkStartTime = now;
  }
  if (isBlinking) {
    const t = (now - blinkStartTime) / 160;
    if (t >= 1) {
      isBlinking = false;
      blinkNextTime = now + 2500 + Math.random() * 4000;
    }
  }

  // ── Brow raise ──
  browRaiseCurrent += (browRaiseTarget - browRaiseCurrent) * Math.min(1, dt * 6);
  const browOffset = browRaiseCurrent * -5;
  browLEl.setAttribute('d', `M 148,${208 + browOffset} Q 162,${198 + browOffset} 178,${202 + browOffset}`);
  browREl.setAttribute('d', `M 222,${202 + browOffset} Q 238,${198 + browOffset} 252,${208 + browOffset}`);

  // ── Viseme targeting ──
  if (isSpeaking && fullTimeline.length > 0 && elapsedMs < timelineDurationMs + 200) {
    // Binary search for current viseme
    let curIdx = 0;
    let lo = 0, hi = fullTimeline.length - 1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      if (fullTimeline[mid].timeMs <= elapsedMs) { curIdx = mid; lo = mid + 1; }
      else { hi = mid - 1; }
    }
    const curId = fullTimeline[curIdx].visemeId;

    // Look-ahead cross-fade
    let nextId = curId;
    let nextTimeMs = Infinity;
    for (let j = curIdx + 1; j < fullTimeline.length; j++) {
      if (fullTimeline[j].visemeId !== curId) {
        nextId = fullTimeline[j].visemeId;
        nextTimeMs = fullTimeline[j].timeMs;
        break;
      }
    }

    for (let i = 0; i < VISEMES.length; i++) targetW[i] = 0;

    const timeUntilNext = nextTimeMs - elapsedMs;
    if (nextId !== curId && timeUntilNext > 0 && timeUntilNext < LOOK_AHEAD_MS) {
      const blend = 1.0 - (timeUntilNext / LOOK_AHEAD_MS);
      targetW[curId] = 1.0 - blend;
      targetW[nextId] = blend;
    } else {
      targetW[curId] = 1.0;
    }

    // Clamp total
    let totalTarget = 0;
    for (let i = 0; i < VISEMES.length; i++) totalTarget += targetW[i];
    if (totalTarget > MAX_TOTAL_WEIGHT) {
      const scale = MAX_TOTAL_WEIGHT / totalTarget;
      for (let i = 0; i < VISEMES.length; i++) targetW[i] *= scale;
    }
  } else if (!isSpeaking) {
    for (let i = 0; i < VISEMES.length; i++) targetW[i] = 0;
  }

  // ── Smooth current weights toward targets ──
  for (let i = 0; i < VISEMES.length; i++) {
    const speed = targetW[i] > currentW[i] ? 12 : 8;
    currentW[i] += (targetW[i] - currentW[i]) * Math.min(1.0, speed * dt);
    if (currentW[i] < 0.0005) currentW[i] = 0;
  }

  // Clamp total weight
  let curTotal = 0;
  for (let i = 0; i < VISEMES.length; i++) curTotal += currentW[i];
  if (curTotal > MAX_TOTAL_WEIGHT) {
    const scale = MAX_TOTAL_WEIGHT / curTotal;
    for (let i = 0; i < VISEMES.length; i++) currentW[i] *= scale;
  }

  // If no visemes active at all, default to sil shape
  if (curTotal < 0.001) {
    currentW[0] = 1;
  }

  // ── Blend shapes & apply SVG ──
  blendShapes(currentW);
  applyMouthShape();

  // ── Timeline ──
  drawTimeline(elapsedMs);

  // ── Debug bars ──
  if (document.getElementById('debug-panel').open) {
    for (let i = 0; i < VISEMES.length; i++) {
      const bar = document.getElementById('bar-' + i);
      const val = document.getElementById('val-' + i);
      if (bar) {
        bar.style.width = (currentW[i] * 80) + 'px';
        val.textContent = currentW[i].toFixed(2);
      }
    }
  }
}

animate();
